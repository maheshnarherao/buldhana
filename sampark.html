<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>संपर्क पृष्ठ</title>
<style>
  body {
    margin: 0;
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    background-color: #e3f2fd; /* Light blue background */
    color: #0d47a1; /* Dark blue text */
  }
  .contact-container {
    background-color: #ffffff; /* White container */
    max-width: 500px;
    margin: 50px auto;
    border-radius: 12px;
    padding: 40px 30px;
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 40px 60px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.1); /* Subtle shadow */
  }
  .contact-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
  }
  .icon-circle {
    border: 3px solid #ff9800; /* Orange border */
    border-radius: 50%;
    width: 70px;
    height: 70px;
    display: flex;
    justify-content: center;
    align-items: center;
    background-color: #fff3e0; /* Light orange background */
  }
  .icon-circle svg {
    stroke: #ff9800; /* Orange stroke */
    width: 32px;
    height: 32px;
  }
  h3 {
    margin: 0;
    font-weight: 700;
    color: #0d47a1; /* Dark blue headings */
    letter-spacing: 0.05em;
  }
  p {
    margin: 0;
    font-weight: 400;
    font-size: 14px;
    color: #1565c0; /* Medium blue text */
  }
  /* Make the last item span both columns on wide screens */
  .contact-item.contact-us {
    grid-column: span 2;
    margin-top: 20px;
    background-color: #e3f2fd; /* Light blue background for emphasis */
    padding: 20px;
    border-radius: 8px;
  }
   /* Navigation Buttons */
    .nav-buttons {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin: 30px 0;
      flex-wrap: wrap;
      animation: fadeInUp 1s ease-out 1.2s both;
    }

    .nav-buttons a, .print-btn {
      padding: 12px 25px;
      background: linear-gradient(to right, #2196f3, #0d47a1);
      color: white;
      text-decoration: none;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      transition: transform 0.2s, box-shadow 0.3s;
    }

    .nav-buttons a:hover, .print-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 15px rgba(33,150,243,0.4);
    }

</style>
</head>
<body>
  <div class="contact-container">
    <div class="contact-item">
      <div class="icon-circle" aria-label="पत्ता">
        <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 21C12 21 5 14.5 5 10.8C5 7.6 7.6 5 10.8 5C14 5 16.6 7.6 16.6 10.8C16.6 14.5 12 21 12 21Z"/>
          <circle cx="12" cy="10.8" r="2.3"/>
        </svg>
      </div>
      <h3>पत्ता</h3>
      <p>📍 पत्ता: बुलढाणा नगर परिषद </p>
      
    </div>

    <div class="contact-item">
      <div class="icon-circle" aria-label="ईमेल">
        <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M4 4H20V20H4V4Z" />
          <path d="M22 4L12 13L2 4" />
        </svg>
      </div>
      <h3>ईमेल</h3>
      <p> 📩 ईमेल:info@Bhuldhana.gov.in </p>
    </div>

    <div class="contact-item">
      <div class="icon-circle" aria-label="फोन">
        <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
          <path d="M22 16.92V20C22 20.5304 21.7893 21.0391 21.4142 21.4142C21.0391 21.7893 20.5304 22 20 22C15.4772 22 11.5228 18.5228 11.5228 14C11.5228 12.8895 11.8074 11.8247 12.3225 10.885L6.29 4.85253C5.74014 4.30267 4.91124 4.05859 4.07247 4.17767C3.2337 4.29674 2.48342 4.76403 1.98984 5.44089C1.49626 6.11774 1.30743 6.9338 1.46244 7.7268C2.95048 14.6459 7.95404 19.6485 14.8721 21.1365C15.6651 21.2915 16.4811 21.1027 17.158 20.6091C17.8349 20.1155 18.3022 19.3652 18.4213 18.5265C18.5403 17.6877 18.2963 16.8588 17.7465 16.309"/>
        </svg>
      </div>
      <h3>फोन</h3>
      <p> 📞+91xxxxxxxxxx</p>
    </div>

    <div class="contact-item">
      <div class="icon-circle" aria-label="कार्यालयीन वेळ">
        <svg fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" viewBox="0 0 24 24" stroke="currentColor" xmlns="http://www.w3.org/2000/svg">
          <circle cx="12" cy="12" r="10"/>
          <polyline points="12,6 12,12 16,14"/>
        </svg>
      </div>
      <h3>कार्यालयीन वेळ</h3>
      <p>⏱️कार्यालयीन वेळ: सकाळी 10 ते संध्याकाळी 5</p>
    </div>

    <div class="contact-item contact-us">
      <h3>आमच्याशी संपर्क करा</h3>
      <p>कोणत्याही मदतीसाठी किंवा आमच्या टीममध्ये सामील होण्यासाठी संपर्क करा</p>
         
    <div class="nav-buttons">
      
      <a href="index.html">🏠 मुख्य पृष्ठ</a>
      
    </div>
     
    </div>
    </div>
    
  </div>
  
</body>
</html>
